name: Update Market Regime Dashboard

on:
  schedule:
    - cron: "0 14 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "30 20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-regime-dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ".github/actions-requirements.txt"

      - name: Install dependencies
        run: python -m pip install -r .github/actions-requirements.txt

      - name: Fetch data and build dashboard
        id: update
        shell: bash
        run: |
          set -euo pipefail
          python scripts/update_vercel_dashboard.py --fetch | tee /tmp/dashboard-update.log
          if grep -q '^PUBLISHED=true$' /tmp/dashboard-update.log; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dashboard update
        if: steps.update.outputs.published == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/fred data/raw/cnn data/raw/yahoo data/processed/market_indicators.csv data/processed/data_manifest.json data/processed/latest_intraday_inputs.json docs/DATA_INVENTORY.md reports/market_regime public data/snapshots
          if git diff --cached --quiet; then
            echo "No staged changes after dashboard update."
            exit 0
          fi
          market_date="$(python -c 'import json; from pathlib import Path; print(json.loads(Path("public/latest.json").read_text(encoding="utf-8"))["as_of_date"])')"
          git commit -m "chore: update market regime dashboard ${market_date}"
          git push
